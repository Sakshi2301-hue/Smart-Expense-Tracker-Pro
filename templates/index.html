<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1>💰 Smart Expense Tracker</h1>
            <p class="text-muted">Manage your daily expenses easily.</p>
        </div>

        <div class="card shadow p-4">
            <div class="row mb-4">
                <div class="col-md-4">
                    <h5>Total Expense</h5>
                    <h2 class="text-danger">₹0</h2>
                </div>
                <div class="col-md-4">
                    <h5>Total Income</h5>
                    <h2 class="text-success">₹0</h2>
                </div>
                <div class="col-md-4">
                    <h5>Balance</h5>
                    <h2 class="text-primary">₹0</h2>
                </div>
            </div>

           <h3>Add New Expense</h3>
<form action="/submit" method="POST"> 
    <label for="date">Date</label>
    <input type="date" id="date" name="date" required>

    <br><br>

    <label for="category">Category</label>
    <select id="category" name="category" required>
        <option value="" disabled selected>-- Select Category --</option>
        <option value="food">Food & Dining</option>
        <option value="transport">Transportation</option>
        <option value="shopping">Shopping</option>
        <option value="bills">Bills & Utilities</option>
        <option value="entertainment">Entertainment</option>
        <option value="others">Others</option>
    </select>

    <br><br>

    <label for="amount">Amount</label>
    <input type="number" id="amount" name="amount" placeholder="Enter amount" step="0.01" min="0" required>

    <br><br>

    <label for="description">Description</label>
    <textarea id="description" name="description" placeholder="Where you spent...."></textarea>

    <br><br>

    <button type="submit">Submit</button>
</form>
        </div>
    </div>

</body>
</html>
